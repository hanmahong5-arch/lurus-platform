<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1677ff" />
    <meta name="format-detection" content="telephone=no, email=no" />

    <title>Lurus 账户中心</title>

    <!-- 中国搜索引擎 + 微信预览友好的 meta 集合 -->
    <meta name="description" content="Lurus 平台统一身份与账单中心 — 一处登录，所有产品畅享。" />
    <meta name="keywords" content="Lurus,账户中心,身份认证,LLM API,AI 量化,统一登录" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lurus 账户中心" />
    <meta property="og:description" content="Lurus 平台统一身份与账单中心" />
    <meta property="og:locale" content="zh_CN" />

    <!-- iOS 主屏添加快捷方式 + 国内浏览器（QQ/UC）友好 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lurus" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="x5-fullscreen" content="false" />
    <meta name="full-screen" content="no" />

    <!-- 备案信息（合规要求；上线前由运维替换 PLACEHOLDER）。
         占位符让代码可发布而不阻塞备案审核 — Footer 组件做兜底渲染。 -->
    <meta name="icp" content="ICP-PLACEHOLDER" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231677ff'/%3E%3Ctext x='16' y='22' font-family='Helvetica,Arial' font-size='18' font-weight='700' fill='%23fff' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231677ff'/%3E%3Ctext x='16' y='22' font-family='Helvetica,Arial' font-size='18' font-weight='700' fill='%23fff' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E" />

    <link rel="stylesheet" href="/semi.min.css" />

    <!-- 中文系统字体优先：iOS/Mac 走 PingFang，Windows 走微软雅黑，
         Android 走思源黑体。**不**加载 web font — 国内 CDN 不稳定且增加首屏延迟。 -->
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont,
          "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", "Source Han Sans SC",
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript style="display:block;padding:24px;font-size:16px;text-align:center;color:#666;">
      请启用 JavaScript 访问 Lurus 账户中心。<br />
      若浏览器版本过旧，建议升级到 Chrome / Edge / Safari 最新版。
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
