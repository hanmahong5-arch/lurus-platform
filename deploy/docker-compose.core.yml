## Lurus Platform — Core Only (Auth + Billing)
## Usage: docker compose -f deploy/docker-compose.core.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lurus_platform
      POSTGRES_USER: lurus
      POSTGRES_PASSWORD: lurus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: "MasterkeyNeedsToHave32Characters"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: lurus
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: lurus
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  core:
    image: ghcr.io/hanmahong5-arch/lurus-platform-core:main
    environment:
      PORT: "18104"
      ENV: development
      DATABASE_DSN: "postgresql://lurus:lurus@postgres:5432/lurus_platform?search_path=identity,billing,public&sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "3"
      INTERNAL_API_KEY: "changeme-internal-key"
      ZITADEL_ISSUER: "http://zitadel:8080"
      ZITADEL_JWKS_URL: "http://zitadel:8080/oauth/v2/keys"
      MODULES_MAIL_ENABLED: "false"
      MODULES_NOTIFICATION_ENABLED: "false"
    ports:
      - "18104:18104"
      - "18105:18105"
    depends_on:
      - postgres
      - redis
      - zitadel

volumes:
  pgdata:
