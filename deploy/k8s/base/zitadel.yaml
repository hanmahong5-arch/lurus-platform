# Zitadel — OIDC Identity Provider
# auth.lurus.cn
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zitadel-config
  namespace: lurus-platform
data:
  zitadel.yaml: |
    Log:
      Level: info
      Formatter:
        Format: text

    ExternalDomain: auth.lurus.cn
    ExternalPort: 443
    ExternalSecure: true

    TLS:
      Enabled: false

    Database:
      Postgres:
        Host: lurus-pg-rw.database.svc
        Port: 5432
        Database: zitadel
        MaxOpenConns: 25
        MaxIdleConns: 10
        MaxConnLifetime: 30m
        MaxConnIdleTime: 5m
        ConnectTimeout: 10s
        User:
          Username: zitadel
          Password: Lurus@ops
          SSL:
            Mode: disable
        Admin:
          Username: zitadel
          Password: Lurus@ops
          SSL:
            Mode: disable

    Machine:
      Identification:
        Hostname:
          Enabled: true

    Auth:
      AmountOfCachedAuthRequests: 1024

    Projections:
      HandleActiveInstances: 720h
      TransactionDuration: 30s
      BulkLimit: 200
      RequeueEvery: 30s
      RetryFailedAfter: 1s
      MaxFailureCount: 5
      ConcurrentInstances: 1

    Caches:
      Connectors:
        Memory:
          Enabled: true
          AutoPrune:
            Interval: 1m
            Timeout: 5s
      Instance:
        Memory:
          MaxAge: 5m
          LastUseAge: 2m
          Size: 100
      Milestones:
        Memory:
          MaxAge: 5m
          LastUseAge: 2m
          Size: 100

    SystemAPIUsers:
      Superuser:
        Path: /machinekey/zitadel-admin-sa.json

    DefaultInstance:
      InstanceName: Lurus Identity
      DefaultLanguage: zh
      Org:
        Name: Lurus
        Human:
          UserName: admin
          FirstName: Admin
          LastName: User
          Email:
            Address: admin@lurus.cn
            Verified: true
          Password: Lurus@ops
          PasswordChangeRequired: false
      PasswordComplexityPolicy:
        MinLength: 6
        HasUppercase: false
        HasLowercase: false
        HasNumber: false
        HasSymbol: false
      LoginPolicy:
        AllowUsernamePassword: true
        AllowRegister: true
        AllowExternalIDP: true
        ForceMFA: false
        PasswordlessType: 1
        HidePasswordReset: false
        IgnoreUnknownUsernames: true
        DisableLoginWithEmail: false
        DisableLoginWithPhone: true
      SMTPConfiguration:
        SMTP:
          Host: stalwart.mail.svc.cluster.local:587
          User: noreply@lurus.cn
          Password: Lurus@ops
        TLS: true
        From: noreply@lurus.cn
        FromName: Lurus

    OIDC:
      AccessTokenLifetime: 1h
      RefreshTokenIdleExpiration: 720h
      RefreshTokenExpiration: 2160h

    Login:
      PasswordReset:
        NotifyUser: true
      MFA:
        Prompt: optional
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  namespace: lurus-platform
  labels:
    app: zitadel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zitadel
  template:
    metadata:
      labels:
        app: zitadel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/debug/metrics"
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: cloud-ubuntu-2-4c8g
      containers:
        - name: zitadel
          image: ghcr.io/zitadel/zitadel:v4.14.0
          args:
            - start-from-init
            - --masterkeyFromEnv
            - --tlsMode=external
            - --config=/config/zitadel.yaml
            - --steps=/config/zitadel.yaml
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: zitadel-secrets
                  key: masterkey
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: grpc
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /debug/healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /debug/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /debug/healthz
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: machinekey
              mountPath: /machinekey
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: zitadel-config
        - name: machinekey
          secret:
            secretName: zitadel-machinekey
---
apiVersion: v1
kind: Service
metadata:
  name: zitadel
  namespace: lurus-platform
  labels:
    app: zitadel
spec:
  selector:
    app: zitadel
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 8081
      targetPort: 8081
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: zitadel-headers
  namespace: lurus-platform
spec:
  headers:
    accessControlAllowCredentials: true
    accessControlAllowHeaders:
      - Accept
      - Authorization
      - Content-Type
      - X-Zitadel-Client-ID
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    accessControlAllowOriginList:
      - https://mail.lurus.cn
      - https://api.lurus.cn
      - https://www.lurus.cn
      - https://auth.lurus.cn
    accessControlMaxAge: 86400
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel
  namespace: lurus-platform
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`auth.lurus.cn`)
      middlewares:
        - name: zitadel-headers
      services:
        - name: zitadel
          port: 8080
  tls:
    secretName: lurus-cn-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel-http
  namespace: lurus-platform
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`auth.lurus.cn`)
      middlewares:
        - name: https-redirect
          namespace: kube-system
      services:
        - name: zitadel
          port: 8080
