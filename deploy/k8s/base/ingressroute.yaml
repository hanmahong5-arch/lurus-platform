apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: platform-core-route
  namespace: lurus-platform
  labels:
    app: platform-core
    app.kubernetes.io/part-of: lurus-platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`identity.lurus.cn`)
      kind: Rule
      services:
        - name: platform-core
          port: 18104
  tls:
    secretName: lurus-cn-wildcard-tls
