apiVersion: v1
kind: ConfigMap
metadata:
  name: lurus-identity-config
  namespace: lurus-identity
data:
  PORT: "18104"
  GRPC_PORT: "18105"
  TZ: "Asia/Shanghai"
  ENV: "production"
  REDIS_ADDR: "redis.lurus-system.svc:6379"
  REDIS_DB: "3"
  NATS_ADDR: "nats://nats.messaging.svc:4222"
  RATE_LIMIT_IP_PER_MINUTE: "120"
  RATE_LIMIT_USER_PER_MINUTE: "300"
  GRACE_PERIOD_DAYS: "3"
  ZITADEL_ADMIN_ROLE: "admin"
  CACHE_ENTITLEMENT_TTL: "5m"
  SHUTDOWN_TIMEOUT: "30s"
  EPAY_GATEWAY_URL: "https://epay.lurus.cn"
  EPAY_NOTIFY_URL: "https://id.lurus.cn/webhook/epay"
  EPAY_RETURN_URL: "https://id.lurus.cn/topup/result"
  STRIPE_RETURN_URL: "https://id.lurus.cn/topup/result"
  CREEM_RETURN_URL: "https://id.lurus.cn/topup/result"
  # ZLogin: set ZITADEL_SERVICE_ACCOUNT_PAT in secrets.yaml (not here — it's a secret)
