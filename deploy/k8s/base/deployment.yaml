apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-core
  namespace: lurus-platform
  labels:
    app: platform-core
    app.kubernetes.io/name: platform-core
    app.kubernetes.io/part-of: lurus-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: platform-core
        app.kubernetes.io/managed-by: argocd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "18104"
        prometheus.io/path: "/metrics"
        # Bump to force rollout when image tag :main moves. Value is
        # the short SHA of the last commit we want this deploy to track.
        rollout.lurus.cn/revision: "6545034"
    spec:
      # ServiceAccount grants scoped Secret/Deployment RBAC needed by the
      # app_registry reconciler (see rbac-app-registry.yaml).
      serviceAccountName: platform-core
      # Removed `nodeSelector: lurus.cn/vpn=true` on 2026-04-28 — the
      # selector was a multi-node-cluster convention (pin platform-core
      # to VPN-enabled nodes) carried over from the old k3s cluster
      # at 100.98.57.55. The new cluster (cloud-ubuntu-5-32c32g) is
      # single-node and the selector blocked rollouts because the node
      # didn't carry the label. If we ever go multi-node again, restore
      # the selector AND label the eligible nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: platform-core
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: platform-core
          image: ghcr.io/hanmahong5-arch/lurus-platform-core:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: Always
          ports:
            - containerPort: 18104
              name: http
            - containerPort: 18105
              name: grpc
          envFrom:
            - configMapRef:
                name: platform-core-config
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: DATABASE_DSN
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: INTERNAL_API_KEY
            - name: ZITADEL_ISSUER
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: ZITADEL_ISSUER
            - name: ZITADEL_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: ZITADEL_JWKS_URL
            - name: ZITADEL_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: ZITADEL_AUDIENCE
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: EPAY_PARTNER_ID
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: EPAY_PARTNER_ID
                  optional: true
            - name: EPAY_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: EPAY_KEY
                  optional: true
            - name: CREEM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: CREEM_API_KEY
                  optional: true
            - name: CREEM_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: CREEM_WEBHOOK_SECRET
                  optional: true
            - name: WECHAT_SERVER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: WECHAT_SERVER_ADDRESS
                  optional: true
            - name: WECHAT_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: WECHAT_SERVER_TOKEN
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SESSION_SECRET
                  optional: true
            - name: ZITADEL_SERVICE_ACCOUNT_PAT
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: ZITADEL_SERVICE_ACCOUNT_PAT
                  optional: true
            - name: WECHAT_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: WECHAT_OAUTH_CLIENT_SECRET
                  optional: true
            - name: NEWAPI_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: NEWAPI_INTERNAL_URL
                  optional: true
            - name: NEWAPI_ADMIN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: NEWAPI_ADMIN_ACCESS_TOKEN
                  optional: true
            - name: NEWAPI_ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: NEWAPI_ADMIN_USER_ID
                  optional: true
            - name: SMS_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_PROVIDER
                  optional: true
            - name: SMS_TENCENT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_SECRET_ID
                  optional: true
            - name: SMS_TENCENT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_SECRET_KEY
                  optional: true
            - name: SMS_TENCENT_APP_ID
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_APP_ID
                  optional: true
            - name: SMS_TENCENT_SIGN_NAME
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_SIGN_NAME
                  optional: true
            - name: SMS_TENCENT_TEMPLATE_ID_VERIFY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_TEMPLATE_ID_VERIFY
                  optional: true
            - name: SMS_TENCENT_TEMPLATE_ID_RESET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_TENCENT_TEMPLATE_ID_RESET
                  optional: true
            - name: SMS_ALIYUN_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_ALIYUN_ACCESS_KEY_ID
                  optional: true
            - name: SMS_ALIYUN_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_ALIYUN_ACCESS_KEY_SECRET
                  optional: true
            - name: SMS_ALIYUN_SIGN_NAME
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_ALIYUN_SIGN_NAME
                  optional: true
            - name: SMS_ALIYUN_TEMPLATE_CODE_VERIFY
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_ALIYUN_TEMPLATE_CODE_VERIFY
                  optional: true
            - name: SMS_ALIYUN_TEMPLATE_CODE_RESET
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: SMS_ALIYUN_TEMPLATE_CODE_RESET
                  optional: true
            - name: STALWART_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-core-secrets
                  key: STALWART_ADMIN_PASSWORD
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          startupProbe:
            httpGet:
              path: /health
              port: 18104
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 18104
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18104
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # apps.yaml is mounted read-only so the reconciler can load it.
            # Kustomize generates the ConfigMap from config/apps.yaml.
            - name: apps-registry
              mountPath: /etc/lurus-platform
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: apps-registry
          configMap:
            name: platform-core-apps-registry
            optional: true  # legacy deployments without the ConfigMap keep booting

