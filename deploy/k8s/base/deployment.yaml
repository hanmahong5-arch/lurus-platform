apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-identity
  namespace: lurus-identity
  labels:
    app: lurus-identity
    app.kubernetes.io/name: lurus-identity
    app.kubernetes.io/part-of: lurus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lurus-identity
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lurus-identity
        app.kubernetes.io/managed-by: argocd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "18104"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        lurus.cn/vpn: "true"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: lurus-identity
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: lurus-identity
          image: ghcr.io/hanmahong5-arch/lurus-identity:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: Always
          ports:
            - containerPort: 18104
              name: http
            - containerPort: 18105
              name: grpc
          envFrom:
            - configMapRef:
                name: lurus-identity-config
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: DATABASE_DSN
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: INTERNAL_API_KEY
            - name: ZITADEL_ISSUER
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: ZITADEL_ISSUER
            - name: ZITADEL_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: ZITADEL_JWKS_URL
            - name: ZITADEL_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: ZITADEL_AUDIENCE
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: EPAY_PARTNER_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: EPAY_PARTNER_ID
                  optional: true
            - name: EPAY_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: EPAY_KEY
                  optional: true
            - name: CREEM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: CREEM_API_KEY
                  optional: true
            - name: CREEM_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: CREEM_WEBHOOK_SECRET
                  optional: true
            - name: WECHAT_SERVER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: WECHAT_SERVER_ADDRESS
                  optional: true
            - name: WECHAT_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: WECHAT_SERVER_TOKEN
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SESSION_SECRET
                  optional: true
            - name: ZITADEL_SERVICE_ACCOUNT_PAT
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: ZITADEL_SERVICE_ACCOUNT_PAT
                  optional: true
            - name: WECHAT_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: WECHAT_OAUTH_CLIENT_SECRET
                  optional: true
            - name: NEWAPI_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: NEWAPI_INTERNAL_URL
                  optional: true
            - name: NEWAPI_ADMIN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: NEWAPI_ADMIN_ACCESS_TOKEN
                  optional: true
            - name: NEWAPI_ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: NEWAPI_ADMIN_USER_ID
                  optional: true
            - name: SMS_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_PROVIDER
                  optional: true
            - name: SMS_TENCENT_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_SECRET_ID
                  optional: true
            - name: SMS_TENCENT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_SECRET_KEY
                  optional: true
            - name: SMS_TENCENT_APP_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_APP_ID
                  optional: true
            - name: SMS_TENCENT_SIGN_NAME
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_SIGN_NAME
                  optional: true
            - name: SMS_TENCENT_TEMPLATE_ID_VERIFY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_TEMPLATE_ID_VERIFY
                  optional: true
            - name: SMS_TENCENT_TEMPLATE_ID_RESET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_TENCENT_TEMPLATE_ID_RESET
                  optional: true
            - name: SMS_ALIYUN_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_ALIYUN_ACCESS_KEY_ID
                  optional: true
            - name: SMS_ALIYUN_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_ALIYUN_ACCESS_KEY_SECRET
                  optional: true
            - name: SMS_ALIYUN_SIGN_NAME
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_ALIYUN_SIGN_NAME
                  optional: true
            - name: SMS_ALIYUN_TEMPLATE_CODE_VERIFY
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_ALIYUN_TEMPLATE_CODE_VERIFY
                  optional: true
            - name: SMS_ALIYUN_TEMPLATE_CODE_RESET
              valueFrom:
                secretKeyRef:
                  name: lurus-identity-secrets
                  key: SMS_ALIYUN_TEMPLATE_CODE_RESET
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 18104
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18104
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
