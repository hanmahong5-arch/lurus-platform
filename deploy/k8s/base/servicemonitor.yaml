apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-core
  namespace: lurus-platform
  labels:
    app: platform-core
    release: prometheus
spec:
  selector:
    matchLabels:
      app: platform-core
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
