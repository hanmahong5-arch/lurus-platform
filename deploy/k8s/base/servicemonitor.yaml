apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lurus-identity
  namespace: lurus-identity
  labels:
    app: lurus-identity
    release: prometheus  # Must match Prometheus operator selector
spec:
  selector:
    matchLabels:
      app: lurus-identity
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
