# ServiceAccount + RBAC for the app_registry reconciler.
#
# The reconciler reads apps.yaml (mounted as a ConfigMap), provisions
# OIDC applications in Zitadel, and writes the returned client_id into
# K8s Secrets in app-owned namespaces, then triggers a rolling restart
# on the target Deployments.
#
# Principle of least privilege:
#   - Secret get/patch/create is scoped via RoleBindings to the specific
#     namespaces listed in apps.yaml (currently: lurus-tally,
#     lurus-admin). platform-core does NOT get cluster-wide Secret
#     access.
#   - Deployment patch is scoped the same way.
#   - Reading its own Pod / Namespace is not needed — all inputs come
#     from the mounted config file.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-core
  namespace: lurus-platform
---
# ── lurus-tally: Secret + Deployment rollout permission ─────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-core-app-registry
  namespace: lurus-tally
rules:
  # K8s RBAC quirk: `resourceNames` filters cannot apply to `create`
  # (the resource doesn't have a name until it's created), so create
  # is granted unconditionally at the namespace level. Misconfigured
  # apps.yaml can therefore create new Secrets in this namespace —
  # but never touch unrelated existing ones, since get/patch/update
  # are restricted via the second rule below.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "update"]
    resourceNames: ["tally-secrets", "tally-secrets-prod"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
    resourceNames: ["tally-web"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-core-app-registry
  namespace: lurus-tally
subjects:
  - kind: ServiceAccount
    name: platform-core
    namespace: lurus-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-core-app-registry
---
# ── lurus-admin: Secret + Deployment rollout permission ─────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-core-app-registry
  namespace: lurus-admin
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "update"]
    resourceNames: ["admin-secrets"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
    resourceNames: ["lurus-admin"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-core-app-registry
  namespace: lurus-admin
subjects:
  - kind: ServiceAccount
    name: platform-core
    namespace: lurus-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-core-app-registry
