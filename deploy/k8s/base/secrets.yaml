# Placeholder — actual values set via kubectl after initial deployment.
# ArgoCD ignoreDifferences on /data ensures real credentials are never overwritten.
# To apply real credentials:
#   kubectl patch secret platform-core-secrets -n lurus-platform --type=merge \
#     -p '{"stringData":{"DATABASE_DSN":"<real dsn>","INTERNAL_API_KEY":"<64char>"}}'
apiVersion: v1
kind: Secret
metadata:
  name: platform-core-secrets
  namespace: lurus-platform
type: Opaque
stringData:
  DATABASE_DSN: ""
  INTERNAL_API_KEY: ""
  ZITADEL_ISSUER: "https://auth.lurus.cn"
  ZITADEL_JWKS_URL: "https://auth.lurus.cn/oauth/v2/keys"
  ZITADEL_AUDIENCE: ""
  REDIS_PASSWORD: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  EPAY_PARTNER_ID: ""
  EPAY_KEY: ""
  CREEM_API_KEY: ""
  CREEM_WEBHOOK_SECRET: ""
  WECHAT_SERVER_ADDRESS: ""
  WECHAT_SERVER_TOKEN: ""
  SESSION_SECRET: ""
  ZITADEL_SERVICE_ACCOUNT_PAT: ""
  WECHAT_OAUTH_CLIENT_SECRET: ""
  NEWAPI_INTERNAL_URL: ""
  NEWAPI_ADMIN_ACCESS_TOKEN: ""
  NEWAPI_ADMIN_USER_ID: ""
  SMS_PROVIDER: ""
  SMS_TENCENT_SECRET_ID: ""
  SMS_TENCENT_SECRET_KEY: ""
