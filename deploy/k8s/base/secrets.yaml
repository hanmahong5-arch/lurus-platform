# Placeholder — actual values set via kubectl after initial deployment.
# ArgoCD ignoreDifferences on /data ensures real credentials are never overwritten.
# To apply real credentials:
#   kubectl patch secret lurus-identity-secrets -n lurus-identity --type=merge \
#     -p '{"stringData":{"DATABASE_DSN":"<real dsn>","INTERNAL_API_KEY":"<64char>"}}'
apiVersion: v1
kind: Secret
metadata:
  name: lurus-identity-secrets
  namespace: lurus-identity
type: Opaque
stringData:
  DATABASE_DSN: ""
  INTERNAL_API_KEY: ""
  ZITADEL_ISSUER: "https://auth.lurus.cn"
  ZITADEL_JWKS_URL: "https://auth.lurus.cn/oauth/v2/keys"
  # ZITADEL_AUDIENCE: numeric project ID of the "lurus-api" project in Zitadel Console.
  # Copy from the URL when viewing the project: /ui/console/projects/<numeric-id>
  # Leave empty to accept any token from this Zitadel instance (less strict).
  ZITADEL_AUDIENCE: ""
  REDIS_PASSWORD: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  EPAY_PARTNER_ID: ""
  EPAY_KEY: ""
  CREEM_API_KEY: ""
  CREEM_WEBHOOK_SECRET: ""
  # WeChat direct login (optional; leave empty to disable WeChat login)
  WECHAT_SERVER_ADDRESS: ""
  WECHAT_SERVER_TOKEN: ""
  # Session secret for lurus-issued HS256 JWT (used by WeChat login)
  # Generate: openssl rand -hex 32
  SESSION_SECRET: ""
  # ZLogin: Zitadel service account PAT with session creation rights.
  # Create in Zitadel Console → Service Users → Generate PAT.
  # Required for custom OIDC login UI (/zlogin). Leave empty to disable.
  ZITADEL_SERVICE_ACCOUNT_PAT: ""
  # WeChat OAuth2 adapter: shared secret between this service and Zitadel IDP config.
  # Generate: openssl rand -hex 32
  # Set the same value in Zitadel Console → IDP → WeChat → Client Secret.
  WECHAT_OAUTH_CLIENT_SECRET: ""
  # NewAPI admin proxy (optional; leave all empty to disable)
  # NEWAPI_INTERNAL_URL: K8s ClusterIP of lurus-newapi
  # NEWAPI_ADMIN_ACCESS_TOKEN: admin user access token generated in newapi
  # NEWAPI_ADMIN_USER_ID: numeric user ID of the admin user in newapi
  NEWAPI_INTERNAL_URL: ""
  NEWAPI_ADMIN_ACCESS_TOKEN: ""
  NEWAPI_ADMIN_USER_ID: ""
  # SMS provider (optional; "tencent" or "aliyun", empty = noop)
  SMS_PROVIDER: ""
  SMS_TENCENT_SECRET_ID: ""
  SMS_TENCENT_SECRET_KEY: ""
  SMS_TENCENT_APP_ID: ""
  SMS_TENCENT_SIGN_NAME: ""
  SMS_TENCENT_TEMPLATE_ID_VERIFY: ""
  SMS_TENCENT_TEMPLATE_ID_RESET: ""
  SMS_ALIYUN_ACCESS_KEY_ID: ""
  SMS_ALIYUN_ACCESS_KEY_SECRET: ""
  SMS_ALIYUN_SIGN_NAME: ""
  SMS_ALIYUN_TEMPLATE_CODE_VERIFY: ""
  SMS_ALIYUN_TEMPLATE_CODE_RESET: ""
