apiVersion: v1
kind: ConfigMap
metadata:
  name: lurus-notification-config
  namespace: lurus-platform
data:
  PORT: "18900"
  TZ: "Asia/Shanghai"
  ENV: "production"
  REDIS_ADDR: "redis.lurus-system.svc.cluster.local:6379"
  REDIS_DB: "4"
  NATS_ADDR: "nats://nats.messaging.svc.cluster.local:4222"
  SMTP_HOST: "stalwart.mail.svc.cluster.local"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@lurus.cn"
  SHUTDOWN_TIMEOUT: "30s"
  OTEL_SERVICE_NAME: "lurus-notification"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability.svc:4317"
  # JWT authentication — platform-core session token validation
  PLATFORM_INTERNAL_URL: "http://platform-core.lurus-platform.svc.cluster.local:18104"
