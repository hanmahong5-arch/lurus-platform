# Secrets for lurus-notification
# Create manually on cluster:
#   kubectl create secret generic lurus-notification-secrets -n lurus-platform \
#     --from-literal=DATABASE_DSN='postgres://...' \
#     --from-literal=INTERNAL_API_KEY='...' \
#     --from-literal=SMTP_USER='...' \
#     --from-literal=SMTP_PASS='...'
apiVersion: v1
kind: Secret
metadata:
  name: lurus-notification-secrets
  namespace: lurus-platform
  labels:
    app: lurus-notification
    app.kubernetes.io/part-of: lurus
type: Opaque
stringData:
  DATABASE_DSN: "REPLACE_ME"
  INTERNAL_API_KEY: "REPLACE_ME"
  SMTP_USER: ""
  SMTP_PASS: ""
