apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-notification
  namespace: lurus-platform
  labels:
    app: lurus-notification
    app.kubernetes.io/name: lurus-notification
    app.kubernetes.io/part-of: lurus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lurus-notification
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lurus-notification
        app.kubernetes.io/managed-by: argocd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "18900"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        lurus.cn/vpn: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: lurus-notification
          image: ghcr.io/hanmahong5-arch/lurus-platform-notification:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18900
              name: http
          envFrom:
            - configMapRef:
                name: lurus-notification-config
          env:
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: lurus-notification-secrets
                  key: DATABASE_DSN
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-notification-secrets
                  key: INTERNAL_API_KEY
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: lurus-notification-secrets
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: lurus-notification-secrets
                  key: SMTP_PASS
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          startupProbe:
            httpGet:
              path: /health
              port: 18900
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 18900
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18900
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
