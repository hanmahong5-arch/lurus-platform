apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: mail
  labels:
    app: stalwart
spec:
  serviceName: stalwart
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      # Prevent K8s service env vars (STALWART_PORT_*, STALWART_SERVICE_*)
      # from colliding with Stalwart's env-var config override system.
      enableServiceLinks: false
      nodeSelector:
        node-role.kubernetes.io/master: "true"
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: stalwart
          image: stalwartlabs/mail-server:v0.11.8
          ports:
            - containerPort: 25
              name: smtp
            - containerPort: 465
              name: submissions
            - containerPort: 587
              name: submission
            - containerPort: 143
              name: imap
            - containerPort: 993
              name: imaps
            - containerPort: 8080
              name: http
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: STALWART_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-secrets
                  key: STALWART_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /opt/stalwart/data
            - name: config
              mountPath: /opt/stalwart/etc
            - name: dkim
              mountPath: /opt/stalwart/dkim
              readOnly: true
            - name: tls
              mountPath: /opt/stalwart/tls
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data
        - name: config
          configMap:
            name: stalwart-config
        - name: dkim
          secret:
            secretName: stalwart-dkim
        - name: tls
          secret:
            secretName: lurus-cn-wildcard-tls
