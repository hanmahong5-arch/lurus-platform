apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webmail-web-pdb
  namespace: lurus-platform
  labels:
    app: webmail-web
    app.kubernetes.io/name: webmail-web
    app.kubernetes.io/part-of: lurus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webmail-web
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webmail-worker-pdb
  namespace: lurus-platform
  labels:
    app: webmail-worker
    app.kubernetes.io/name: webmail-worker
    app.kubernetes.io/part-of: lurus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webmail-worker
