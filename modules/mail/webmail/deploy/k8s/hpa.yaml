apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webmail-web-hpa
  namespace: lurus-webmail
  labels:
    app: webmail-web
    app.kubernetes.io/name: webmail-web
    app.kubernetes.io/part-of: lurus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webmail-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webmail-worker-hpa
  namespace: lurus-webmail
  labels:
    app: webmail-worker
    app.kubernetes.io/name: webmail-worker
    app.kubernetes.io/part-of: lurus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webmail-worker
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
