# Kustomization for Webmail
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lurus-platform

resources:
- namespace.yaml
- secrets.yaml
- configmap.yaml
- redis.yaml
- typesense.yaml
- supabase.yaml
- webmail-app.yaml
- ingress.yaml
- mail-tcp-routes.yaml
- pdb.yaml
- hpa.yaml
# db-init.yaml 手动执行一次即可
# stalwart/ has its own kustomization (namespace: mail), deploy separately:
#   kubectl apply -k k8s/stalwart/
