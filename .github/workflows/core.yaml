name: Core CI/CD

on:
  push:
    branches: [master]
    paths:
      - "cmd/core/**"
      - "internal/**"
      - "proto/**"
      - "web/**"
      - "migrations/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
  pull_request:
    branches: [master]
    paths:
      - "cmd/core/**"
      - "internal/**"
      - "proto/**"
      - "web/**"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure private Go modules
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/hanmahong5-arch/*" >> "$GITHUB_ENV"
          echo "GONOSUMCHECK=github.com/hanmahong5-arch/*" >> "$GITHUB_ENV"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
          args: --timeout=5m
        env:
          GOWORK: "off"

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./internal/... ./cmd/...
        env:
          GOFLAGS: "-count=1"
          GOWORK: "off"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-platform-core
          path: coverage.out
          retention-days: 7

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/hanmahong5-arch/lurus-platform-core:main
            ghcr.io/hanmahong5-arch/lurus-platform-core:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
