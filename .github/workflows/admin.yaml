# Admin Dashboard CI/CD — follows governance reusable-frontend.yaml pattern.
# Structure: Typecheck & Lint → Build & Push (with Trivy scan)
name: Admin Dashboard CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/admin.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/admin/**'
  workflow_dispatch:

jobs:
  test:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        run: bun run build

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hanmahong5-arch/lurus-platform-admin

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hanmahong5-arch/lurus-platform-admin:main
            ghcr.io/hanmahong5-arch/lurus-platform-admin:${{ steps.version.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/hanmahong5-arch/lurus-platform-admin:${{ steps.version.outputs.value }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
