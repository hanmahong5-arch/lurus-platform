name: Admin Dashboard CI/CD

on:
  push:
    branches: [master]
    paths:
      - "apps/admin/**"
  pull_request:
    branches: [master]
    paths:
      - "apps/admin/**"

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

  push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/admin
          file: apps/admin/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hanmahong5-arch/lurus-platform-admin:main
            ghcr.io/hanmahong5-arch/lurus-platform-admin:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
