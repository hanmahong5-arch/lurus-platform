name: Webmail CI/CD

on:
  push:
    branches: [master]
    paths:
      - "modules/mail/webmail/**"
  pull_request:
    branches: [master]
    paths:
      - "modules/mail/webmail/**"

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/mail/webmail
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build web
        run: bun run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/postgres"
          DATABASE_RLS_URL: "postgresql://user:pass@localhost:5432/postgres"
          SERVICE_ROLE_KEY: "placeholder"
          REDIS_PASSWORD: "placeholder"
          REDIS_HOST: "redis"
          REDIS_PORT: "6379"
          WORKER_URL: "http://worker"
          API_URL: "http://kong:8000"
          DAV_URL: "http://dav:80"

  push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - app: web
            dockerfile: modules/mail/webmail/Dockerfile.web
            image: lurus-platform-webmail-web
          - app: worker
            dockerfile: modules/mail/webmail/Dockerfile.worker
            image: lurus-platform-webmail-worker
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="main-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: modules/mail/webmail
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hanmahong5-arch/${{ matrix.image }}:main
            ghcr.io/hanmahong5-arch/${{ matrix.image }}:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
