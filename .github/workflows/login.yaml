name: Login UI CI/CD

on:
  push:
    branches: [master]
    paths:
      - "apps/login/**"
  pull_request:
    branches: [master]
    paths:
      - "apps/login/**"

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          SHA7="$(git rev-parse --short=7 HEAD)"
          echo "value=main-${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/login
          file: apps/login/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/hanmahong5-arch/lurus-login:main
            ghcr.io/hanmahong5-arch/lurus-login:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/hanmahong5-arch/lurus-login:${{ steps.version.outputs.value }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
