# Placeholder — actual values set via kubectl after initial deployment.
# kubectl patch secret lurus-login-secrets -n lurus-login --type=merge \
#   -p '{"stringData":{"ZITADEL_SERVICE_USER_ID":"<id>","ZITADEL_SERVICE_USER_TOKEN":"<pat>"}}'
#
# To create the service account:
#   Zitadel Console → Service Users → New User (Machine)
#   → Generate Personal Access Token
#   → Copy User ID (numeric string after the @ in loginName)
apiVersion: v1
kind: Secret
metadata:
  name: lurus-login-secrets
  namespace: lurus-login
type: Opaque
stringData:
  ZITADEL_SERVICE_USER_ID: ""
  ZITADEL_SERVICE_USER_TOKEN: ""
