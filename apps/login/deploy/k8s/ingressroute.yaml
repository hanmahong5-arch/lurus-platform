apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lurus-login
  namespace: lurus-platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`login.lurus.cn`)
      kind: Rule
      services:
        - name: lurus-login
          port: 3000
      middlewares:
        - name: lurus-login-headers
  tls:
    secretName: lurus-cn-wildcard-tls
---
# Inject required headers for Zitadel's OIDC proxy middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lurus-login-headers
  namespace: lurus-platform
spec:
  headers:
    customRequestHeaders:
      X-Zitadel-Public-Host: "login.lurus.cn"
      X-Zitadel-Instance-Host: "auth.lurus.cn"
