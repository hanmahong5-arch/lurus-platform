apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-login
  namespace: lurus-platform
  labels:
    app: lurus-login
    app.kubernetes.io/name: lurus-login
    app.kubernetes.io/part-of: lurus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lurus-login
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lurus-login
        app.kubernetes.io/managed-by: argocd
      annotations:
        # Bump to force rollout when image tag :main moves. Value is
        # the short SHA of the last commit we want this deploy to track.
        rollout.lurus.cn/revision: "7deabc8"
    spec:
      # nodeSelector intentionally omitted — single-node cluster
      # (cloud-ubuntu-5-32c32g) doesn't carry the legacy
      # lurus.cn/vpn=true label and the selector blocks scheduling.
      # Restore + label nodes if we go multi-node again.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: lurus-login
          # Lurus-customized Login UI — see apps/login/Dockerfile.
          # The :main tag rolls forward on every push to master via
          # .github/workflows/login.yaml. imagePullPolicy: Always +
          # rollout.lurus.cn/revision annotation make `kubectl rollout
          # restart` pick up the latest CI build.
          image: ghcr.io/hanmahong5-arch/lurus-login:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Next.js needs writable /tmp
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: lurus-login-config
          env:
            - name: ZITADEL_SERVICE_USER_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-login-secrets
                  key: ZITADEL_SERVICE_USER_ID
            - name: ZITADEL_SERVICE_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lurus-login-secrets
                  key: ZITADEL_SERVICE_USER_TOKEN
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /ui/v2/login
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /ui/v2/login
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ui/v2/login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
