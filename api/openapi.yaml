openapi: 3.1.0
info:
  title: Lurus Platform API
  description: |
    Enterprise Identity, Billing & Communication Platform.
    Provides unified account, VIP, wallet, subscription, and entitlement management.

    **Auth modes:**
    - Internal (`/internal/v1/*`): `Authorization: Bearer $INTERNAL_API_KEY`
    - Public (`/api/v1/*`): Zitadel JWT or lurus session token
    - Admin (`/admin/v1/*`): Zitadel JWT with admin role
  version: 1.0.0
  contact:
    name: Lurus Platform Team

servers:
  - url: http://platform-core.lurus-platform.svc:18104
    description: In-cluster (K8s service)
  - url: https://identity.lurus.cn
    description: Public (via Traefik IngressRoute)

tags:
  - name: health
    description: Health check
  - name: internal-account
    description: Service-to-service account operations
  - name: internal-billing
    description: Service-to-service billing operations
  - name: internal-checkout
    description: Cross-service checkout flow
  - name: internal-wallet
    description: Service-to-service wallet operations
  - name: internal-org
    description: Service-to-service organization operations
  - name: public-account
    description: User-facing account endpoints
  - name: public-wallet
    description: User-facing wallet & topup
  - name: public-subscription
    description: Subscription management
  - name: public-product
    description: Product & plan catalog
  - name: public-invoice
    description: Invoice management
  - name: public-refund
    description: Refund management
  - name: public-checkin
    description: Daily check-in
  - name: public-org
    description: Organization management
  - name: admin-account
    description: Admin account management
  - name: admin-product
    description: Admin product/plan management
  - name: admin-ops
    description: Admin operations (redemption codes, reports)
  - name: admin-settings
    description: Admin platform settings
  - name: webhook
    description: Payment provider webhooks

# ─────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────
security: []

components:
  securitySchemes:
    InternalApiKey:
      type: http
      scheme: bearer
      description: INTERNAL_API_KEY for service-to-service calls
    ZitadelJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Zitadel OIDC JWT token
    AdminJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Zitadel JWT with admin role

  # ─────────────────────────────────────────
  # Reusable Schemas
  # ─────────────────────────────────────────
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    PaginatedResponse:
      type: object
      properties:
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer

    Account:
      type: object
      properties:
        id:
          type: integer
          format: int64
        lurus_id:
          type: string
        zitadel_sub:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        phone:
          type: string
        phone_verified:
          type: boolean
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri
        status:
          type: integer
          description: "1=active, 2=suspended, 3=deleted"
        locale:
          type: string
        aff_code:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AccountOverview:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/AccountSummary'
        vip:
          $ref: '#/components/schemas/VIPSummary'
        wallet:
          $ref: '#/components/schemas/WalletSummary'
        subscription:
          $ref: '#/components/schemas/SubscriptionSummary'
        topup_url:
          type: string

    AccountSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        lurus_id:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string

    VIPSummary:
      type: object
      properties:
        level:
          type: integer
        level_name:
          type: string
        level_en:
          type: string
        points:
          type: integer
          format: int64
        level_expires_at:
          type: string
          format: date-time

    WalletSummary:
      type: object
      properties:
        balance:
          type: number
          format: double
        frozen:
          type: number
          format: double
        discount_rate:
          type: number
          format: double
        discount_tier:
          type: string

    SubscriptionSummary:
      type: object
      properties:
        product_id:
          type: string
        plan_code:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
        auto_renew:
          type: boolean

    Entitlements:
      type: object
      additionalProperties:
        type: string
      description: Map of entitlement key to value

    WalletOperationResult:
      type: object
      properties:
        success:
          type: boolean
        balance_after:
          type: number
          format: double

    BillingSummary:
      type: object
      properties:
        balance:
          type: number
          format: double
        frozen:
          type: number
          format: double
        pre_auths:
          type: integer
        pending_orders:
          type: integer

    CheckoutRequest:
      type: object
      required: [account_id, amount_cny, payment_method, source_service]
      properties:
        account_id:
          type: integer
          format: int64
        amount_cny:
          type: number
          format: double
        payment_method:
          type: string
        source_service:
          type: string
        idempotency_key:
          type: string
        return_url:
          type: string
        ttl_seconds:
          type: integer

    CheckoutResponse:
      type: object
      properties:
        order_no:
          type: string
        pay_url:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time

    PreAuthRequest:
      type: object
      required: [amount, product_id]
      properties:
        amount:
          type: number
          format: double
        product_id:
          type: string
        reference_id:
          type: string
        description:
          type: string
        ttl_seconds:
          type: integer

    PreAuthResponse:
      type: object
      properties:
        preauth_id:
          type: string
        amount:
          type: number
          format: double
        expires_at:
          type: string
          format: date-time
        status:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string

    ProductPlan:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        name:
          type: string
        plan_code:
          type: string
        price_cny:
          type: number
          format: double
        duration_days:
          type: integer

    Subscription:
      type: object
      properties:
        id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        product_id:
          type: string
        plan_code:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
        auto_renew:
          type: boolean

    Invoice:
      type: object
      properties:
        invoice_no:
          type: string
        order_no:
          type: string
        amount:
          type: number
          format: double
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Refund:
      type: object
      properties:
        refund_no:
          type: string
        order_no:
          type: string
        amount:
          type: number
          format: double
        reason:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        status:
          type: string

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
paths:
  # ── Health ──
  /health:
    get:
      tags: [health]
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: lurus-platform

  # ─────────────────────────────────────────
  # Internal API — Service-to-Service
  # ─────────────────────────────────────────

  /internal/v1/accounts/by-zitadel-sub/{sub}:
    get:
      tags: [internal-account]
      operationId: getAccountByZitadelSub
      summary: Lookup account by Zitadel OIDC sub claim
      security:
        - InternalApiKey: []
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /internal/v1/accounts/by-email/{email}:
    get:
      tags: [internal-account]
      operationId: getAccountByEmail
      summary: Lookup account by email
      security:
        - InternalApiKey: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found

  /internal/v1/accounts/by-phone/{phone}:
    get:
      tags: [internal-account]
      operationId: getAccountByPhone
      summary: Lookup account by phone
      security:
        - InternalApiKey: []
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found

  /internal/v1/accounts/by-oauth/{provider}/{provider_id}:
    get:
      tags: [internal-account]
      operationId: getAccountByOAuth
      summary: Lookup account by OAuth binding (e.g. WeChat openid)
      security:
        - InternalApiKey: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: provider_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found

  /internal/v1/accounts/upsert:
    post:
      tags: [internal-account]
      operationId: upsertAccount
      summary: Create or update account from OIDC login
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [zitadel_sub, email]
              properties:
                zitadel_sub:
                  type: string
                email:
                  type: string
                  format: email
                display_name:
                  type: string
                avatar_url:
                  type: string
                referrer_aff_code:
                  type: string
      responses:
        '200':
          description: Account upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /internal/v1/accounts/validate-session:
    post:
      tags: [internal-account]
      operationId: validateSession
      summary: Validate a session token
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Session valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Invalid session

  /internal/v1/accounts/{id}/overview:
    get:
      tags: [internal-account]
      operationId: getAccountOverviewInternal
      summary: Aggregated account overview (account + VIP + wallet + subscription)
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: product_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Account overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOverview'

  /internal/v1/accounts/{id}/entitlements/{product_id}:
    get:
      tags: [internal-billing]
      operationId: getEntitlements
      summary: Get product entitlements for an account (Redis-cached)
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entitlements map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'

  /internal/v1/accounts/{id}/subscription/{product_id}:
    get:
      tags: [internal-billing]
      operationId: getSubscriptionInternal
      summary: Get active subscription for a product
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: No active subscription

  /internal/v1/usage/report:
    post:
      tags: [internal-billing]
      operationId: reportUsage
      summary: Report LLM usage for VIP accumulation
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id, amount_cny]
              properties:
                account_id:
                  type: integer
                  format: int64
                amount_cny:
                  type: number
                  format: double
      responses:
        '200':
          description: Usage accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean

  /internal/v1/accounts/{id}/wallet/balance:
    get:
      tags: [internal-wallet]
      operationId: getWalletBalance
      summary: Quick wallet balance lookup
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Balance info
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    format: double
                  frozen:
                    type: number
                    format: double

  /internal/v1/accounts/{id}/wallet/debit:
    post:
      tags: [internal-wallet]
      operationId: walletDebit
      summary: Debit (deduct) from account wallet
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type]
              properties:
                amount:
                  type: number
                  format: double
                type:
                  type: string
                  description: Transaction type
                product_id:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Debit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletOperationResult'

  /internal/v1/accounts/{id}/billing-summary:
    get:
      tags: [internal-billing]
      operationId: getBillingSummary
      summary: Billing aggregation (balance, frozen, pre-auths, pending orders)
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Billing summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSummary'

  /internal/v1/checkout/create:
    post:
      tags: [internal-checkout]
      operationId: createCheckout
      summary: Create cross-service checkout order
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'

  /internal/v1/checkout/{order_no}/status:
    get:
      tags: [internal-checkout]
      operationId: getCheckoutStatus
      summary: Query checkout order status
      security:
        - InternalApiKey: []
      parameters:
        - name: order_no
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout status
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_no:
                    type: string
                  status:
                    type: string
                  amount_cny:
                    type: number
                    format: double
                  pay_url:
                    type: string
                  paid_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time

  /internal/v1/payment-methods:
    get:
      tags: [internal-checkout]
      operationId: getPaymentMethods
      summary: List available payment methods
      security:
        - InternalApiKey: []
      responses:
        '200':
          description: Payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_methods:
                    type: array
                    items:
                      type: object

  /internal/v1/accounts/{id}/wallet/pre-authorize:
    post:
      tags: [internal-wallet]
      operationId: walletPreAuthorize
      summary: Create pre-authorization hold on wallet
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreAuthRequest'
      responses:
        '200':
          description: Pre-auth created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreAuthResponse'

  /internal/v1/wallet/pre-auth/{id}/settle:
    post:
      tags: [internal-wallet]
      operationId: settlePreAuth
      summary: Settle a pre-authorization (capture actual amount)
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual_amount]
              properties:
                actual_amount:
                  type: number
                  format: double
      responses:
        '200':
          description: Pre-auth settled
          content:
            application/json:
              schema:
                type: object
                properties:
                  preauth_id:
                    type: string
                  status:
                    type: string
                  held_amount:
                    type: number
                    format: double
                  actual_amount:
                    type: number
                    format: double
                  settled_at:
                    type: string
                    format: date-time

  /internal/v1/wallet/pre-auth/{id}/release:
    post:
      tags: [internal-wallet]
      operationId: releasePreAuth
      summary: Release a pre-authorization hold
      security:
        - InternalApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pre-auth released
          content:
            application/json:
              schema:
                type: object
                properties:
                  preauth_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                    format: double

  /internal/v1/orgs/resolve-api-key:
    post:
      tags: [internal-org]
      operationId: resolveOrgApiKey
      summary: Resolve organization by API key
      security:
        - InternalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
      responses:
        '200':
          description: Organization resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: API key not found

  # ─────────────────────────────────────────
  # Public API — User-Facing
  # ─────────────────────────────────────────

  /api/v1/account/me:
    get:
      tags: [public-account]
      operationId: getMe
      summary: Get current user profile
      security:
        - ZitadelJWT: []
      responses:
        '200':
          description: User profile with VIP and subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  vip:
                    $ref: '#/components/schemas/VIPSummary'
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
    put:
      tags: [public-account]
      operationId: updateMe
      summary: Update current user profile
      security:
        - ZitadelJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar_url:
                  type: string
                locale:
                  type: string
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /api/v1/account/me/overview:
    get:
      tags: [public-account]
      operationId: getMyOverview
      summary: Aggregated overview for current user
      security:
        - ZitadelJWT: []
      parameters:
        - name: product_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Account overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOverview'

  /api/v1/account/me/referral:
    get:
      tags: [public-account]
      operationId: getMyReferral
      summary: Get referral code and stats
      security:
        - ZitadelJWT: []
      responses:
        '200':
          description: Referral info
          content:
            application/json:
              schema:
                type: object
                properties:
                  aff_code:
                    type: string
                  referral_url:
                    type: string
                  stats:
                    type: object

  /api/v1/account/me/delete-request:
    post:
      tags: [public-account]
      operationId: requestSelfAccountDeletion
      summary: Submit a user-initiated account deletion request
      description: |
        Registers the authenticated user's intent to delete their own account.
        The request enters a 30-day cooling-off period (PIPL §47 / GDPR Art.17)
        during which the user may cancel by re-authenticating. After the
        cooling-off elapses, an out-of-band worker dispatches the same
        cascade used by the admin-driven `/admin/v1/accounts/{id}/delete-request`
        flow.

        Idempotent: re-submitting while a request is already pending returns
        `200 OK` carrying the existing `request_id` rather than creating a
        duplicate. If the account is already in the terminal `Deleted`
        status the response is `200 OK` with `already_deleted: true`.
      security:
        - ZitadelJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason code from a closed enum.
                  enum:
                    - no_longer_using
                    - privacy_concern
                    - experience_issue
                    - found_alternative
                    - other
                reason_text:
                  type: string
                  maxLength: 500
                  description: |
                    Optional free-text explanation. Inputs longer than 500
                    characters are silently truncated; the request is NOT
                    rejected on a length nit.
      responses:
        '200':
          description: |
            Delete request registered, OR an existing pending request is
            being surfaced idempotently, OR the account is already deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: Numeric id of the pending row, as a string.
                  status:
                    type: string
                    enum: [pending, already_deleted]
                  cooling_off_until:
                    type: string
                    format: date-time
                  already_deleted:
                    type: boolean
                    description: True when the account is already in the terminal Deleted state.
        '400':
          description: Validation failure (e.g. unrecognised `reason` enum value).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid Zitadel JWT.
        '409':
          description: |
            Account has an active subscription that must be cancelled first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

