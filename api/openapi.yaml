      operationId: getAccountAdmin
      summary: Full account details
      security:
        - AdminJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Full account info
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  vip:
                    $ref: '#/components/schemas/VIPSummary'
                  subscriptions:
                    type: array
