          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type]
              properties:
                amount:
                  type: number
                  format: double
                type:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Adjustment applied
          content:
            application/json:
              schema:
                type: object
                properties:
